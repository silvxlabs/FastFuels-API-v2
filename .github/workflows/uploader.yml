name: CI/CD Pipeline for Uploader Service

env:
  SERVICE_NAME: uploader-v2
  REPO_NAME: v2
  REGION: us-west1
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'services/uploader/**'
      - 'services/lib/**'
      - '.github/workflows/uploader.yml'

jobs:
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.set-env.outputs.deploy_env }}
    steps:
      - name: Set deployment environment based on branch
        id: set-env
        run: |
          if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
            echo "deploy_env=prod" >> $GITHUB_OUTPUT
          else
            echo "deploy_env=dev" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Docker Image and Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: determine-environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ needs.determine-environment.outputs.deploy_env }}
          file: services/uploader/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ needs.determine-environment.outputs.deploy_env }}
    runs-on: ubuntu-latest
    needs: [ determine-environment, build ]
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: |
          # The /scratch ephemeral-disk volume (for the point-cloud COPC build)
          # is attached out-of-band per environment — like the GCS buckets and
          # Firestore indexes — and `gcloud run deploy` preserves it across
          # routine image rolls, so it is not declared here. A new environment
          # needs a one-time:
          #   gcloud beta run services update <svc> --region <region> \
          #     --add-volume=name=scratch,type=ephemeral-disk,size=10Gi \
          #     --add-volume-mount=volume=scratch,mount-path=/scratch
          gcloud run deploy ${{ env.SERVICE_NAME }}-${{ needs.determine-environment.outputs.deploy_env }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ needs.determine-environment.outputs.deploy_env }} \
            --region ${{ env.REGION }} \
            --update-env-vars="\
              DEPLOYMENT_ENV=${{ needs.determine-environment.outputs.deploy_env }},\
              GCP_PROJECT=${{ secrets.GCP_PROJECT }},\
              GCP_REGION=${{ env.REGION }},\
              UPLOADS_BUCKET=${{ secrets.UPLOADS_BUCKET }},\
              GRIDS_BUCKET=${{ secrets.GRIDS_BUCKET }},\
              INVENTORIES_BUCKET=${{ secrets.INVENTORIES_BUCKET }},\
              POINT_CLOUDS_BUCKET=${{ secrets.POINT_CLOUDS_BUCKET }}" \
            --quiet

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [ determine-environment, deploy ]
    # Login shell so the micromamba env (with PDAL) is active in every run step.
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PDAL (libpdal + python-pdal) is a conda-forge package — pip can't supply
      # a /vsi-capable build — so the test runner uses micromamba, matching the
      # uploader image.
      - name: Set up micromamba with PDAL
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: uploader-ci
          init-shell: bash
          cache-environment: true
          create-args: >-
            python=3.13
            pdal
            python-pdal
            uv

      - name: Install dependencies
        working-directory: services/uploader
        run: |
          uv pip install --python "$(which python)" \
            --editable "../lib[firestore,gcs,raster,zarr]" \
            --editable ".[test]"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Run tests
        working-directory: services/uploader
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_REGION: ${{ env.REGION }}
          UPLOADS_BUCKET: ${{ secrets.UPLOADS_BUCKET }}
          GRIDS_BUCKET: ${{ secrets.GRIDS_BUCKET }}
          INVENTORIES_BUCKET: ${{ secrets.INVENTORIES_BUCKET }}
          POINT_CLOUDS_BUCKET: ${{ secrets.POINT_CLOUDS_BUCKET }}
        run: pytest tests/ -v
