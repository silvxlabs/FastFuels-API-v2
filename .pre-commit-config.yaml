repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        exclude: services/api/api/data/conus_4326.geojson
      - id: check-merge-conflict
      - id: end-of-file-fixer
        # treevox/data holds vendored DUET artifacts (the binary and the species
        # table its Fortran reads). They must stay byte-identical to the copies
        # in gs://silvx-fastfuels-executables, so nothing may reformat them.
        exclude: ^services/treevox/treevox/data/
      - id: trailing-whitespace
        exclude: ^services/treevox/treevox/data/
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
